<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GNB Sudameris PSE</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f2f2f2;
  text-align:center;
}

/* HEADER */
.header{
  background:linear-gradient(to bottom, #9cc54a, #7fae35);
  padding:10px 20px;
  display:flex;
  align-items:center;
}

.header img{
  height:50px;
  display:block;
}
/* TITLE */
.title{
  margin:30px 0;
  font-weight:bold;
  font-size:20px;
}

/* CARD */
.card{
  background:#fff;
  width:300px;
  margin:0 auto;
  padding:25px;
  border-radius:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

.tab{
  padding:8px 12px;
  background:#cce0ea;
  border-radius:3px;
  font-size:14px;
}

.tab.active{
  background:#1f6fa5;
  color:#fff;
}

/* FORM */
label{
  display:block;
  text-align:left;
  font-size:13px;
  margin:10px 0 5px;
}

input{
  width:100%;
  padding:8px;
  border:1px solid #8fb3d9;
  outline:none;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:10px;
  background:#7fb23a;
  color:#fff;
  border:none;
  width:100%;
  font-weight:bold;
}

/* BACK */
.back{
  margin-top:15px;
  display:inline-block;
  background:#7fb23a;
  color:#fff;
  padding:6px 15px;
  font-size:13px;
}

/* FOOTER */
.footer{
  margin-top:30px;
  font-size:12px;
}

/* MOBILE */
@media(max-width:600px){
  .card{
    width:90%;
  }
}
</style>

</head>

<body>

<div class="header">
  <img src="LogoGNB.jpg">
</div>

<div class="title">
  PAGOS PSE DEL BANCO GNB SUDAMERIS
</div>

<div class="card">

  <div class="tabs">
    <div class="tab active">Personas</div>
    <div class="tab">Empresas</div>
  </div>

  <label>Usuario:</label>
  <input type="text">

  <label>Clave</label>
  <input type="password">

  <button class="btn">Ingreso</button>

</div>

<div class="back">&lt;&lt; Volver</div>

<div class="footer">
  Banco GNB Sudameris Nit. 860.050.750 - 1
</div>

</body>
</html>
