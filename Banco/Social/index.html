<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Portal Personas</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: Arial, sans-serif;
  display:flex;
  height:100vh;
  overflow-x:hidden;
}

/* LEFT IMAGE */
.left{
  width:50%;
  background:url('fondo.png') center/cover no-repeat;
}

/* RIGHT PANEL */
.right{
  width:50%;
  background:#f5f6f7;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px;
}

/* LOGOS */
.top-logos{
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:20px;
}

.top-logos img{
  height:40px;
}

/* TITLE */
h1{
  font-size:36px;
  margin:10px 0;
}

.desc{
  max-width:480px;
  color:#555;
  line-height:1.5;
}

/* FORM */
.form{
  margin-top:20px;
  max-width:400px;
}

label{
  font-weight:bold;
  display:block;
  margin-top:20px;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:5px;
  font-size:16px;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:14px 25px;
  border-radius:25px;
  border:none;
  cursor:pointer;
  width:100%;
}

.btn-primary{
  background:#c5ccd3;
  color:#555;
}

.btn-outline{
  border:2px solid #0a5bbf;
  color:#0a5bbf;
  background:white;
}

/* MOBILE */
@media(max-width:900px){

  body{
    flex-direction:column;
  }

  .left{
    width:100%;
    height:220px;
  }

  .right{
    width:100%;
    padding:25px 24px 30px 24px;
  }

  .top-logos{
    justify-content:space-between;
    gap:10px;
  }

  .top-logos img{
    height:28px;
  }

  h1{
    font-size:26px;
    line-height:1.2;
    margin-top:10px;
  }

  .desc{
    font-size:14px;
  }

  .form{
    width:100%;
    max-width:100%;
  }

  .buttons{
    flex-direction:column-reverse;
    gap:12px;
  }

}
</style>

</head>
<body>

<div class="left"></div>

<div class="right">

  <div class="top-logos">
    <img src="logo.svg">
    <img src="pse-logo.svg">
  </div>

  <h1>Bienvenido al Portal Personas</h1>

  <p class="desc">
    Recuerde que su usuario está compuesto por su Tipo de Identificación 
    (CC, CE, NI, TI, PE) y su Número de Identificación sin espacios, puntos ni comas.
  </p>

  <div class="form">
    <label>Usuario</label>
    <input type="text" placeholder="Ejemplo: CC1234567890">

    <div class="buttons">
      <button class="btn btn-outline">Cancelar</button>
      <button class="btn btn-primary">Siguiente</button>
    </div>
  </div>

</div>

</body>
</html>
