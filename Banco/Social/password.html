<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password - Portal Personas</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family: Arial, sans-serif;
  display:flex;
  height:100vh;
}

/* LEFT */
.left{
  width:50%;
  background:url('background-4.png') center/cover no-repeat;
}

/* RIGHT */
.right{
  width:50%;
  background:#f5f6f7;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px;
}

/* logos */
.top-logos{
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:20px;
}
.top-logos img{ height:40px; }

/* title */
h1{
  font-size:34px;
  margin:10px 0;
}

.desc{
  color:#555;
  max-width:420px;
  margin-bottom:20px;
}

/* form */
.form{
  max-width:400px;
}

label{
  font-weight:bold;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #9fb3c8;
  margin-top:8px;
  font-size:16px;
}

/* buttons */
.buttons{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.btn{
  padding:12px 24px;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
}

.btn-outline{
  border:2px solid #0a5bbf;
  color:#0a5bbf;
  background:#fff;
}

.btn-primary{
  background:#0a5bbf;
  color:#fff;
  border:none;
}

/* mobile */
@media(max-width:900px){
  body{flex-direction:column;}
  .left{width:100%; height:220px;}
  .right{
    width:100%;
    padding:25px 24px;
  }
  h1{font-size:26px;}
  .buttons{
    flex-direction:column-reverse;
  }
  .btn{width:100%;}
}
</style>

</head>
<body>

<div class="left"></div>

<div class="right">

  <div class="top-logos">
    <img src="logoBCSLine.svg">
    <img src="pse-logo.svg">
  </div>

  <h1>Bienvenido al Portal Personas</h1>

  <p class="desc">
    Ingrese su contraseña de canales digitales, recuerde que está compuesta por 8 caracteres.
  </p>

  <div class="form">
    <label>Contraseña</label>
    <input type="password">

    <div class="buttons">
      <button class="btn btn-outline">Cancelar</button>
      <button class="btn btn-primary">Iniciar sesión</button>
    </div>
  </div>

</div>

</body>
</html>
