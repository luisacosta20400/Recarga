<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itaú PSE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f5f5f5;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
}

.container{
  width:100%;
  max-width:1100px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:60px;
}

/* LEFT */
.left{
  max-width:420px;
}

.logo{
  width:50px;
  margin-bottom:20px;
}

h1{
  font-size:36px;
  margin-bottom:20px;
}

label{
  font-size:14px;
  margin-top:15px;
  display:block;
}

input, select{
  width:100%;
  padding:14px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

/* INPUT GROUP */
.password{
  position:relative;
}

.password span{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

/* LINK */
.link{
  margin:15px 0;
  display:block;
  color:#0066cc;
  font-size:14px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:10px;
  background:#ddd;
  color:#999;
  font-weight:600;
  cursor:not-allowed;
}

.btn.active{
  background:#ff6200;
  color:#fff;
  cursor:pointer;
}

/* RIGHT IMAGE */
.right img{
  width:350px;
  border-radius:30px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* FOOTER */
.footer{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  font-size:12px;
  color:#666;
  border-top:1px solid #ddd;
}

/* MOBILE */
@media(max-width:900px){
  .container{
    flex-direction:column;
    align-items:flex-start;
  }

  .right{
    display:none;
  }

  h1{
    font-size:28px;
  }
}
</style>

</head>

<body>

<div class="main">
  <div class="container">

    <div class="left">
      <img src="logo.png" class="logo">

      <h1>Ingresa tus datos</h1>

      <label>Tipo de documento</label>
      <select>
        <option>Cédula de ciudadanía</option>
      </select>

      <label>Número de documento</label>
      <input type="text" id="doc" placeholder="Ingresa número de documento">

      <label>Clave</label>
      <div class="password">
        <input type="password" id="pass" placeholder="Ingresa tu clave">
      </div>

      <a href="#" class="link">¿Tienes problemas con tu clave?</a>

      <button id="btn" class="btn">Ingresar</button>
    </div>

    <div class="right">
      <img src="img.png">
    </div>

  </div>
</div>

<div class="footer">
  <div>VIGILADO SUPERINTENDENCIA FINANCIERA DE COLOMBIA</div>
  <div>Copyright © 2026 Itaú Colombia S.A.</div>
</div>

<script>
const doc = document.getElementById('doc');
const pass = document.getElementById('pass');
const btn = document.getElementById('btn');

function activar(){
  if(doc.value.trim() !== "" && pass.value.trim() !== ""){
    btn.classList.add('active');
    btn.disabled = false;
  }else{
    btn.classList.remove('active');
    btn.disabled = true;
  }
}

doc.addEventListener('input', activar);
pass.addEventListener('input', activar);
</script>

</body>
</html>
